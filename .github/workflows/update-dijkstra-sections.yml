        with:
          ref: codex/update-dijkstra-sections

      - name: Replace sections 4.1 and 4.2
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('_posts/01_算法/2025-04-21-图论.md')
          text = path.read_text(encoding='utf-8')

          replacement = r'''### 4.1. Dijkstra 算法

Dijkstra 用于求解**边权非负图中的单源最短路径**。

核心思想是：每次从小根堆中取出当前距离最小的节点，再使用该节点松弛相邻节点。对于边 `u → v`，权重为 `w`：

```python
dist[v] = min(dist[v], dist[u] + w)
```

如果某个节点以更短距离被更新，就将新状态重新加入堆中。

```python
import heapq
from math import inf


def dijkstra(graph, start):
    n = len(graph)
    dist = [inf] * n
    dist[start] = 0
    heap = [(0, start)]  # (距离, 节点)

    while heap:
        d, u = heapq.heappop(heap)

        # 堆中可能保留着更新前的旧状态
        if d != dist[u]:
            continue

        for v, w in graph[u]:
            new_dist = d + w
            if new_dist < dist[v]:
                dist[v] = new_dist
                heapq.heappush(heap, (new_dist, v))

    return dist
```

时间复杂度为 `O((V + E) log V)`。Dijkstra 不能处理负权边，因为节点以最小距离出堆后，算法默认该距离不会再变小。

---

### 4.2. 二维 Dijkstra：节点与状态共同决定最短路

普通 Dijkstra 使用 `dist[u]` 表示到达节点 `u` 的最短距离。但有些问题中，仅知道当前位置还不够，路径携带的状态也会影响后续选择。

例如，要求路径上的标签序列中，**连续相同字符的数量不能超过 `k`**。两条路径虽然到达同一个节点，但末尾连续字符数量不同，后续能否继续走也可能不同，因此不能合并为同一个状态。

此时定义：

```python
dist[u][cnt]
```

表示到达节点 `u`，且路径末尾已有 `cnt` 个连续相同字符时的最短距离。堆中的元素也从 `(距离, 节点)` 扩展为：

```text
(距离, 节点, 连续字符数量)
```

状态转移规则：

```python
if labels[u] == labels[v]:
    next_cnt = cnt + 1
else:
    next_cnt = 1
```

若 `next_cnt > k`，该路径不合法，直接跳过。

```python
import heapq
from math import inf


def shortest_path(n, edges, labels, k):
    graph = [[] for _ in range(n)]
    for u, v, w in edges:
        graph[u].append((v, w))

    # dist[u][cnt]：到达 u，末尾连续相同字符数为 cnt 时的最短距离
    dist = [[inf] * (k + 1) for _ in range(n)]
    dist[0][1] = 0
    heap = [(0, 0, 1)]

    while heap:
        d, u, cnt = heapq.heappop(heap)

        if d != dist[u][cnt]:
            continue

        if u == n - 1:
            return d

        for v, w in graph[u]:
            if labels[u] == labels[v]:
                next_cnt = cnt + 1
                if next_cnt > k:
                    continue
            else:
                next_cnt = 1

            new_dist = d + w
            if new_dist < dist[v][next_cnt]:
                dist[v][next_cnt] = new_dist
                heapq.heappush(heap, (new_dist, v, next_cnt))

    return -1
```

以 `edges = [[0,1,1], [1,2,1], [0,2,3]]`、`labels = "aab"` 为例：

- `k = 1`：路径 `0 → 1` 会产生连续两个 `a`，只能走 `0 → 2`，答案为 `3`。
- `k = 2`：路径 `0 → 1 → 2` 合法，答案为 `1 + 1 = 2`。

二维 Dijkstra 的本质是把节点 `u` 扩展为状态节点 `(u, state)`，然后在扩展后的状态图上运行 Dijkstra。判断是否需要增加状态维度的关键是：

> 到达同一个节点时，不同的历史状态是否会影响后续选择？

如果会影响，就不能只使用 `dist[node]`。

**经典例题：**

- [100879. 最多 K 个连续相同字符的最短路径](https://leetcode.cn/problems/shortest-path-with-at-most-k-consecutive-identical-characters/description/)

---

'''

          pattern = re.compile(
              r'### 4\.1\. Dijkstra 算法.*?(?=### 4\.3\. Bellman-Ford 算法)',
