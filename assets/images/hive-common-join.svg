  <rect x="60" y="90" width="180" height="70" rx="14" fill="#7aa6c2"/>
  <text x="116" y="133" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#ffffff">表 A</text>

  <rect x="60" y="200" width="180" height="70" rx="14" fill="#7aa6c2"/>
  <text x="116" y="243" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#ffffff">表 B</text>

  <rect x="330" y="145" width="220" height="70" rx="14" fill="#d8b36a"/>
  <text x="382" y="188" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#ffffff">Shuffle</text>

  <rect x="650" y="145" width="220" height="70" rx="14" fill="#4f6d7a"/>
  <text x="706" y="188" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#ffffff">Reduce Join</text>

