<svg xmlns="http://www.w3.org/2000/svg" width="960" height="380" viewBox="0 0 960 380">
  <rect width="960" height="380" fill="#f7f4ea"/>
  <text x="40" y="48" font-size="30" font-family="Segoe UI, Microsoft YaHei, PingFang SC, sans-serif" fill="#243b53">How lateral view works with explode</text>
  <text x="40" y="78" font-size="16" font-family="Segoe UI, Microsoft YaHei, PingFang SC, sans-serif" fill="#486581">Hive keeps the original row context while turning one array into multiple output rows.</text>

  <rect x="40" y="130" width="190" height="150" rx="18" fill="#ffffff" stroke="#cbd2d9" stroke-width="2"/>
  <text x="64" y="162" font-size="20" font-family="Segoe UI, Microsoft YaHei, PingFang SC, sans-serif" fill="#243b53">Base row</text>
  <text x="64" y="204" font-size="16" font-family="Consolas, monospace" fill="#243b53">user_id = 1001</text>
  <text x="64" y="234" font-size="16" font-family="Consolas, monospace" fill="#243b53">tags = sports,</text>
  <text x="64" y="258" font-size="16" font-family="Consolas, monospace" fill="#243b53">movie,music</text>

  <rect x="280" y="130" width="180" height="150" rx="18" fill="#ffffff" stroke="#cbd2d9" stroke-width="2"/>
  <text x="312" y="162" font-size="20" font-family="Segoe UI, Microsoft YaHei, PingFang SC, sans-serif" fill="#243b53">split()</text>
  <text x="308" y="214" font-size="15" font-family="Consolas, monospace" fill="#243b53">["sports",</text>
  <text x="308" y="238" font-size="15" font-family="Consolas, monospace" fill="#243b53"> "movie",</text>
  <text x="308" y="262" font-size="15" font-family="Consolas, monospace" fill="#243b53"> "music"]</text>

  <rect x="510" y="130" width="170" height="150" rx="18" fill="#ffffff" stroke="#cbd2d9" stroke-width="2"/>
  <text x="544" y="162" font-size="20" font-family="Segoe UI, Microsoft YaHei, PingFang SC, sans-serif" fill="#243b53">explode()</text>
  <text x="542" y="214" font-size="15" font-family="Consolas, monospace" fill="#243b53">sports</text>
  <text x="542" y="238" font-size="15" font-family="Consolas, monospace" fill="#243b53">movie</text>
  <text x="542" y="262" font-size="15" font-family="Consolas, monospace" fill="#243b53">music</text>

  <rect x="730" y="110" width="190" height="190" rx="18" fill="#ffffff" stroke="#cbd2d9" stroke-width="2"/>
  <text x="752" y="142" font-size="20" font-family="Segoe UI, Microsoft YaHei, PingFang SC, sans-serif" fill="#243b53">lateral view output</text>
  <text x="752" y="186" font-size="15" font-family="Consolas, monospace" fill="#243b53">1001  sports</text>
  <text x="752" y="214" font-size="15" font-family="Consolas, monospace" fill="#243b53">1001  movie</text>
  <text x="752" y="242" font-size="15" font-family="Consolas, monospace" fill="#243b53">1001  music</text>
  <text x="752" y="278" font-size="15" font-family="Segoe UI, Microsoft YaHei, PingFang SC, sans-serif" fill="#486581">keep user_id + exploded tag</text>

  <line x1="230" y1="205" x2="280" y2="205" stroke="#243b53" stroke-width="4"/>
  <polygon points="280,205 266,197 266,213" fill="#243b53"/>
  <line x1="460" y1="205" x2="510" y2="205" stroke="#243b53" stroke-width="4"/>
  <polygon points="510,205 496,197 496,213" fill="#243b53"/>
  <line x1="680" y1="205" x2="730" y2="205" stroke="#243b53" stroke-width="4"/>
  <polygon points="730,205 716,197 716,213" fill="#243b53"/>
</svg>
